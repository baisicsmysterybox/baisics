<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baisics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{scroll-behavior:smooth;height:100%}
body{font-family:'Jost',sans-serif;background:#FAF6EE}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#FAF6EE}
::-webkit-scrollbar-thumb{background:#C4503A;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(110%)}to{transform:translateX(0)}}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.fu{animation:fadeUp .4s ease both}
.oi{animation:fadeInBg .22s ease both}
.si{animation:slideIn .35s cubic-bezier(.34,1.1,.64,1) both}
.mi{animation:fadeUp .32s cubic-bezier(.34,1.1,.64,1) both}
.fl{animation:floatY 3.5s ease-in-out infinite}
.card{transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.card:hover{transform:translateY(-6px) scale(1.014);box-shadow:0 18px 40px rgba(156,21,11,.13)!important}
.btn{transition:all .18s ease;cursor:pointer;outline:none;border:none;font-family:'Jost',sans-serif}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
input,textarea,select{outline:none;font-family:'Jost',sans-serif}
input:focus,textarea:focus,select:focus{border-color:#9C150B!important;box-shadow:0 0 0 3px rgba(156,21,11,.15)!important}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px;padding-bottom:64px}
/* Hero divider wave */
.hero-wave{width:100%;overflow:hidden;line-height:0;margin-top:-2px}
/* Badge pill hover */
.badge-pill{transition:background .2s,transform .2s;display:inline-block}
.badge-pill:hover{transform:translateY(-2px)}
/* Section heading underline */
.sec-title{position:relative;display:inline-block}
.sec-title::after{content:"";position:absolute;bottom:-6px;left:0;right:0;height:2px;background:linear-gradient(90deg,#9C150B,transparent);border-radius:2px}
@media(max-width:560px){
  .items-grid{grid-template-columns:1fr 1fr!important;gap:11px!important}
  .card-btns{flex-direction:column!important;gap:5px!important}
  .card-price{font-size:14px!important}
  .card-name{font-size:16px!important}
  .hide-sm{display:none!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const {useState,useEffect,useRef,useMemo}=React;

const DCFG={
whatsapp:“60123456789”,adminPass:“admin123”,
siteName:“Baisics”,tagline:“curated mystery boxes ✦”,
discPct:10,promoCode:””,promoPct:0,
jbKey:”$2a$10$BXkVan9Db9eFVS1ghQjrpuq39DtVmn5Y2JEf7MXpf0UGyY4HngBG6”,
jbId:“69afda2eff3f7076473e2c11”,
aboutText:“We are Baisics — a small, passion-driven mystery box brand. Every box is carefully curated with love, bringing you delightful surprises that make ordinary days feel magical. ✦\n\nEach box is packed with handpicked items chosen to bring joy, beauty, and a little magic into your life.”,
contactWa:“60123456789”,contactEmail:“hello@baisics.com”,
contactIG:”@baisics”,contactIGLink:“https://instagram.com/baisics”,
contactTT:”@baisics”,contactTTLink:“https://tiktok.com/@baisics”,
heroTags:[“✦ mystery inside”,“✦ curated with love”,“✦ free surprise”],
heroImage:””,heroBg:””,
accentColor:”#E8192C”,accentLight:”#FDEAEA”,accentMid:”#C94060”,
bgColor:”#FAF6EE”,cardColor:”#FFFFFF”,footerColor:”#1A0808”,
borderColor:”#EAD9D0”,textDark:”#1A0808”,textMid:”#5C2A1A”,textLight:”#9E7060”,
};

function buildTheme(cfg){
const a=cfg.accentColor||”#E8192C”;
const al=cfg.accentLight||”#FDEAEA”;
const am=cfg.accentMid||”#C94060”;
const bg=cfg.bgColor||”#FAF6EE”;
const card=cfg.cardColor||”#FFFFFF”;
const footer=cfg.footerColor||”#1A0808”;
const border=cfg.borderColor||”#EAD9D0”;
const td=cfg.textDark||”#1A0808”;
const tm=cfg.textMid||”#5C2A1A”;
const tl=cfg.textLight||”#9E7060”;
let s=document.getElementById(“baisics-theme”);
if(!s){s=document.createElement(“style”);s.id=“baisics-theme”;document.head.appendChild(s);}
s.textContent=`:root{--accent:${a};--bg:${bg};}`;
return{cream:bg,white:card,pl:al,pm:am,pd:a,yl:”#FFF6E0”,ym:”#E8C84A”,yd:”#A67C00”,t:td,tm,tl,b:border,footer,sh:“0 4px 20px rgba(0,0,0,.07)”,sh2:“0 14px 40px rgba(0,0,0,.13)”};
}

/* ── STORAGE ── */
const LS={
get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const JB={
async pull(key,id){
if(!key||!id)return null;
try{const r=await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`,{headers:{‘X-Master-Key’:key}});if(!r.ok)return null;const d=await r.json();return d.record||null;}catch{return null;}
},
async push(key,id,data){
if(!key||!id)return false;
try{const r=await fetch(`https://api.jsonbin.io/v3/b/${id}`,{method:‘PUT’,headers:{‘X-Master-Key’:key,‘Content-Type’:‘application/json’},body:JSON.stringify(data)});return r.ok;}catch{return false;}
}
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const iSt=(C,x={})=>({width:“100%”,padding:“11px 15px”,borderRadius:10,border:`1.5px solid ${C.b}`,fontSize:14,background:C.cream,color:C.t,fontFamily:”‘Jost’,sans-serif”,…x});
function Lbl({c}){return <label style={{fontSize:11,fontWeight:600,textTransform:“uppercase”,letterSpacing:”.09em”,color:C.tm,display:“block”,marginBottom:5}}>{c}</label>;}
function Chip({ch,bg,col}){return <span style={{background:bg||C.yl,color:col||C.tm,borderRadius:50,padding:“3px 10px”,fontSize:11,fontWeight:500}}>{ch}</span>;}
function Toast({m}){return <div className=“mi” style={{position:“fixed”,bottom:30,left:10,right:10,background:C.t,color:C.white,padding:“13px 18px”,borderRadius:16,zIndex:9999,fontSize:13,textAlign:“center”,boxShadow:“0 6px 20px rgba(0,0,0,.25)”,pointerEvents:“none”,lineHeight:1.5}}>{m}</div>;}

/* ══════════════ APP ══════════════ */
function App(){
const[pg,setPg]=useState(“shop”);
const[cur,setCur]=useState(null);
const[formFlow,setFormFlow]=useState(null);
const C=useMemo(()=>buildTheme(cfg),[cfg]); // {item,form,mode:“cart”|“order”}
const[orderModal,setOrderModal]=useState(null); // {item,answers,mode}
const[items,setItemsS]=useState([]);
const[forms,setFormsS]=useState([]);
const[cart,setCart]=useState([]);
const[cOpen,setCOpen]=useState(false);
const[aOpen,setAOpen]=useState(false);
const[aMode,setAMode]=useState(“login”);
const[user,setUser]=useState(null);
const[users,setUsersS]=useState([]);
const[cfg,setCfgS]=useState(DCFG);
const[notif,setNotif]=useState(null);
const[adminOk,setAdminOk]=useState(false);
const[loading,setLoading]=useState(true);
const logoTaps=useRef(0);
const logoTimer=useRef(null);

useEffect(()=>{(async()=>{
const cloud=await JB.pull(DCFG.jbKey,DCFG.jbId);
if(cloud){
setItemsS(cloud.items||[]);LS.set(“mx:items”,cloud.items||[]);
setFormsS(cloud.forms||[]);LS.set(“mx:forms”,cloud.forms||[]);
setUsersS(cloud.users||[]);LS.set(“mx:users”,cloud.users||[]);
const merged={…DCFG,…(cloud.cfg||{})};setCfgS(merged);LS.set(“mx:cfg”,merged);
setLoading(false);return;
}
setItemsS(LS.get(“mx:items”)||[]);
setFormsS(LS.get(“mx:forms”)||[]);
setUsersS(LS.get(“mx:users”)||[]);
setCfgS(LS.get(“mx:cfg”)||DCFG);
setLoading(false);
})();},[]);

const syncCloud=async(ni,nf,nu,nc)=>{
const c=nc||cfg;if(!c.jbKey||!c.jbId)return;
await JB.push(c.jbKey,c.jbId,{items:ni||items,forms:nf||forms,users:nu||users,cfg:c});
};
const saveItems=async v=>{setItemsS(v);LS.set(“mx:items”,v);await syncCloud(v,null,null,null);};
const saveForms=async v=>{setFormsS(v);LS.set(“mx:forms”,v);await syncCloud(null,v,null,null);};
const saveUsers=async v=>{setUsersS(v);LS.set(“mx:users”,v);await syncCloud(null,null,v,null);};
const saveCfg=async v=>{setCfgS(v);LS.set(“mx:cfg”,v);await syncCloud(null,null,null,v);};

const toast=m=>{setNotif(m);setTimeout(()=>setNotif(null),3000)};
const handleLogoTap=()=>{
logoTaps.current++;clearTimeout(logoTimer.current);
if(logoTaps.current>=5){logoTaps.current=0;setPg(“admin”);toast(“🔐 Admin mode”)}
else{logoTimer.current=setTimeout(()=>{logoTaps.current=0},2000)}
};
useEffect(()=>{if(window.location.search.includes(“admin”)||window.location.hash.includes(“admin”))setPg(“admin”);},[]);

/* ── CART ── */
const addCart=(it,qty=1,answers=null)=>{
setCart(p=>{
const e=p.find(c=>c.id===it.id);
const entry={…it,qty,answers:answers||null};
return e?p.map(c=>c.id===it.id?{…c,qty:c.qty+qty}:c):[…p,entry];
});
toast(`${it.name} added to cart! 🛍️`);
};
const remCart=id=>setCart(p=>p.filter(c=>c.id!==id));
const updQty=(id,q)=>{if(q<1)return remCart(id);setCart(p=>p.map(c=>c.id===id?{…c,qty:q}:c))};
const cnt=cart.reduce((s,c)=>s+c.qty,0);
const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
const hasSignupDisc=user&&user.discUsed===false;

const goItem=it=>{setCur(it);setFormFlow(null);setPg(“item”);window.scrollTo(0,0)};
const goShop=()=>{setPg(“shop”);setCur(null);setFormFlow(null)};

/* ── DIRECT ORDER (no form) ── */
const openDirectOrder=it=>{setOrderModal({item:it,answers:null,mode:“direct”});};

/* ── FORM FLOW: start ── */
const startFormFlow=(item,form,mode)=>{
setFormFlow({item,form,mode});setPg(“orderform”);window.scrollTo(0,0);
};
/* ── FORM FLOW: finish → open modal ── */
const finishFormFlow=(item,answers,mode)=>{
setFormFlow(null);
if(mode===“cart”){addCart(item,1,answers);setPg(“item”);setCur(item);}
else{setOrderModal({item,answers,mode:“custom”});setPg(“item”);setCur(item);}
};

/* ── CART CHECKOUT ── */
const cartCheckout=(promoApplied,discAmt,phone,cartName)=>{
if(!cart.length)return;
const n=cartName||user?.name||“Customer”;
const lines=cart.map(c=>{
let line=`• ${c.name} x${c.qty} — RM${(c.price*c.qty).toFixed(2)}`;
if(c.answers&&Object.keys(c.answers).length>0){
const choices=Object.entries(c.answers).map(([,v])=>Array.isArray(v)?v.join(”, “):v).filter(Boolean).join(”, “);
if(choices)line+=`\n  (${choices})`;
}
return line;
}).join(”\n”);
let msg=`Hello! I'd like to place an order 🛍️\n\n*Order Details:*\n${lines}\n\n`;
if(discAmt>0)msg+=`Discount: -RM${discAmt.toFixed(2)}\n`;
msg+=`*Total: RM${(sub-discAmt).toFixed(2)}*\n\nName: ${n}`;
if(phone)msg+=`\nPhone: ${phone}`;
if(user&&user.email)msg+=`\nEmail: ${user.email}`;
window.open(`https://wa.me/${cfg.whatsapp}?text=${encodeURIComponent(msg)}`,”_blank”);
if(hasSignupDisc&&user&&promoApplied===“signup”){
const u2={…user,discUsed:true};setUser(u2);saveUsers(users.map(u=>u.email===user.email?u2:u));
}
};

if(loading)return(
<div style={{height:“100vh”,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,background:“linear-gradient(160deg,#1A0A06 0%,#3D1010 40%,#6B1A10 100%)”,gap:14}}>
<div className=“fl” style={{fontSize:52,color:”#E8A090”}}>✦</div>
<p style={{fontFamily:”‘Cormorant Garamond’,serif”,fontSize:40,color:”#FAF6EE”,fontWeight:300,letterSpacing:”.02em”}}>{DCFG.siteName}</p>
<p style={{color:“rgba(250,246,238,.5)”,fontSize:12,letterSpacing:”.2em”,textTransform:“uppercase”}}>preparing your magic…</p>
</div>
);

return(
<div style={{minHeight:“100vh”,background:C.cream,display:“flex”,flexDirection:“column”}}>
{notif&&<Toast m={notif}/>}

```
  {/* NAV */}
  <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(250,246,238,.96)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${C.b}`,padding:"0 20px",flexShrink:0}}>
    <div style={{maxWidth:1200,margin:"0 auto",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
      <button onClick={()=>{handleLogoTap();goShop()}} className="btn" style={{background:"none",display:"flex",alignItems:"center",gap:7,padding:0}}>
        <span style={{color:C.pd,fontSize:18}}>✦</span>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:C.t}}>{cfg.siteName}</span>
      </button>
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        {user?(
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:12,color:C.tm}} className="hide-sm">{user.name.split(" ")[0]}</span>
            <button onClick={()=>setUser(null)} className="btn" style={{background:C.pl,borderRadius:50,padding:"6px 14px",fontSize:12,color:C.pd}}>logout</button>
          </div>
        ):(
          <div style={{display:"flex",gap:5}}>
            <button onClick={()=>{setAMode("login");setAOpen(true)}} className="btn" style={{background:"none",border:`1.5px solid ${C.b}`,borderRadius:50,padding:"6px 14px",fontSize:13,color:C.t}}>login</button>
            <button onClick={()=>{setAMode("signup");setAOpen(true)}} className="btn hide-sm" style={{background:C.pd,borderRadius:50,padding:"6px 14px",fontSize:13,color:C.white}}>sign up</button>
          </div>
        )}
        <button onClick={()=>setCOpen(true)} className="btn" style={{position:"relative",background:C.t,borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:16}}>🛍️</span>
          {cnt>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.pd,color:C.white,borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{cnt}</span>}
        </button>
      </div>
    </div>
  </nav>

  {/* PAGES */}
  <div style={{flex:1}}>
    {pg==="shop"&&<ShopPage C={C} items={items} onItem={goItem} onAdd={addCart} cfg={cfg} forms={forms}/>}
    {pg==="item"&&cur&&<ItemPage C={C} item={cur} items={items} forms={forms} onBack={goShop} onAdd={addCart} onItem={goItem} onDirectOrder={openDirectOrder} onStartForm={startFormFlow} cfg={cfg}/>}
    {pg==="orderform"&&formFlow&&<CustomOrderForm C={C} item={formFlow.item} form={formFlow.form} mode={formFlow.mode} onBack={()=>{setCur(formFlow.item);setPg("item");window.scrollTo(0,0)}} onFinish={finishFormFlow}/>}
    {pg==="about"&&<AboutPage C={C} cfg={cfg} onBack={goShop}/>}
    {pg==="contact"&&<ContactPage C={C} cfg={cfg} onBack={goShop}/>}
    {pg==="privacy"&&<PrivacyPage C={C} onBack={goShop}/>}
    {pg==="admin"&&<AdminPage ok={adminOk} onAuth={p=>{if(p===cfg.adminPass){setAdminOk(true);return true}return false}} C={C} items={items} saveItems={saveItems} forms={forms} saveForms={saveForms} users={users} saveUsers={saveUsers} cfg={cfg} saveCfg={saveCfg} onBack={goShop} toast={toast}/>}
  </div>

  {/* FOOTER */}
  {pg!=="admin"&&(
    <footer style={{background:C.t,color:"rgba(255,255,255,.55)",padding:"40px 20px 24px",marginTop:"auto"}}>
      <div style={{maxWidth:1200,margin:"0 auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:32,marginBottom:32}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
              <span style={{color:C.pm,fontSize:16}}>✦</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:C.white,fontWeight:500}}>{cfg.siteName}</span>
            </div>
            <p style={{fontSize:13,lineHeight:1.7}}>{cfg.tagline}</p>
          </div>
          <div>
            <p style={{color:C.white,fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Explore</p>
            {[["shop","🛍️ Shop"],["about","About Us"],["contact","Contact"]].map(([p,l])=>(
              <button key={p} onClick={()=>{setPg(p);window.scrollTo(0,0)}} className="btn" style={{display:"block",background:"none",color:"rgba(255,255,255,.55)",fontSize:13,padding:"3px 0",textAlign:"left",width:"100%"}}
                onMouseEnter={e=>e.currentTarget.style.color=C.white} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.55)"}>{l}</button>
            ))}
          </div>
          <div>
            <p style={{color:C.white,fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Legal</p>
            <button onClick={()=>{setPg("privacy");window.scrollTo(0,0)}} className="btn" style={{display:"block",background:"none",color:"rgba(255,255,255,.55)",fontSize:13,padding:"3px 0",textAlign:"left",width:"100%"}}
              onMouseEnter={e=>e.currentTarget.style.color=C.white} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.55)"}>Privacy Policy</button>
          </div>
          <div>
            <p style={{color:C.white,fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Contact</p>
            <p style={{fontSize:13,lineHeight:1.9}}>
              <a href={`https://wa.me/${cfg.contactWa||cfg.whatsapp}`} target="_blank" style={{color:"rgba(255,255,255,.45)",textDecoration:"none",display:"block",marginBottom:5}}>💬 {cfg.contactWa||cfg.whatsapp}</a>
              {cfg.contactIGLink&&<a href={cfg.contactIGLink} target="_blank" style={{color:"rgba(255,255,255,.45)",textDecoration:"none",display:"block",marginBottom:5}}>📸 {cfg.contactIG}</a>}
              {cfg.contactTTLink&&<a href={cfg.contactTTLink} target="_blank" style={{color:"rgba(255,255,255,.45)",textDecoration:"none",display:"block",marginBottom:5}}>🎵 {cfg.contactTT}</a>}
              {cfg.contactEmail&&<a href={`mailto:${cfg.contactEmail}`} style={{color:"rgba(255,255,255,.45)",textDecoration:"none",display:"block"}}>✉️ {cfg.contactEmail}</a>}
            </p>
          </div>
        </div>
        <div style={{borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <p style={{fontSize:12}}>© {new Date().getFullYear()} {cfg.siteName}. All rights reserved.</p>
          <button onClick={()=>{setPg("admin");window.scrollTo(0,0)}} className="btn" style={{background:"none",color:"rgba(255,255,255,.1)",fontSize:11,padding:0}}
            onMouseEnter={e=>e.currentTarget.style.color="rgba(255,255,255,.3)"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.1)"}>manage</button>
        </div>
      </div>
    </footer>
  )}

  {/* OVERLAYS */}
  {cOpen&&<CartDrawer C={C} cart={cart} onClose={()=>setCOpen(false)} onRem={remCart} onQty={updQty} onCheckout={cartCheckout} sub={sub} hasSignupDisc={hasSignupDisc} discPct={cfg.discPct} cfg={cfg} user={user} onSignup={()=>{setCOpen(false);setAMode("signup");setAOpen(true)}}/>}
  {aOpen&&<AuthModal C={C} mode={aMode} setMode={setAMode} onClose={()=>setAOpen(false)} users={users} saveUsers={saveUsers} onLogin={u=>{setUser(u);setAOpen(false);toast(`Welcome back, ${u.name}! 💕`)}} onSignup={u=>{setUser(u);setAOpen(false);toast(`Welcome ${u.name}! 🎉 You've got ${cfg.discPct}% off your first order!`)}} cfg={cfg}/>}
  {orderModal&&<OrderSummaryModal C={C} item={orderModal.item} answers={orderModal.answers} onClose={()=>setOrderModal(null)} cfg={cfg} user={user} hasSignupDisc={hasSignupDisc} saveUsers={saveUsers} users={users} setUser={setUser} onSignup={()=>{setOrderModal(null);setAMode("signup");setAOpen(true)}}/>}
</div>

);
}

/* ══════════════ SHOP PAGE ══════════════ */
function ShopPage({C,items,onItem,onAdd,cfg,forms}){
const[q,setQ]=useState(””);
const list=items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase()));
return(
<div>
{/* Hero */}

/* ══════════════ CUSTOM ORDER FORM ══════════════ */
function CustomOrderForm({C,item,form,mode,onBack,onFinish}){
const[step,setStep]=useState(0);
const[answers,setAnswers]=useState({});
const questions=form.questions||[];
const curQ=questions[step];

const getAns=qid=>answers[qid];
const setAns=(qid,val)=>setAnswers(p=>({…p,[qid]:val}));
const toggleMulti=(qid,val)=>{const cur=answers[qid]||[];setAns(qid,cur.includes(val)?cur.filter(v=>v!==val):[…cur,val])};

const canNext=()=>{
if(!curQ||curQ.required===false)return true;
const ans=answers[curQ.id];
if(curQ.type===“multi”)return ans&&ans.length>0;
if(curQ.type===“text”)return ans&&ans.trim().length>0;
return !!ans;
};

const next=()=>{
if(!canNext())return;
if(step<questions.length-1){setStep(s=>s+1);window.scrollTo(0,0);}
else{onFinish(item,answers,mode);}
};

const progress=Math.round((step/Math.max(questions.length,1))*100);

return(
<div style={{maxWidth:560,margin:“0 auto”,padding:“28px 16px 64px”}}>
<button onClick={step===0?onBack:()=>{setStep(s=>s-1);window.scrollTo(0,0)}} className=“btn”
style={{background:“none”,color:C.tm,fontSize:14,marginBottom:16,display:“flex”,alignItems:“center”,gap:5}}>
← {step===0?“back to product”:“previous”}
</button>

function AuthModal({C,mode,setMode,onClose,users,saveUsers,onLogin,onSignup,cfg}){
const[f,setF]=useState({name:””,email:””,password:””});
const[err,setErr]=useState(””);
const[busy,setBusy]=useState(false);
const go=()=>{
setErr(””);setBusy(true);
setTimeout(()=>{
if(mode===“signup”){
if(!f.name||!f.email||!f.password){setErr(“Please fill in all fields.”);setBusy(false);return;}
if(!/\S+@\S+.\S+/.test(f.email)){setErr(“Please enter a valid email.”);setBusy(false);return;}
if(users.find(u=>u.email===f.email)){setErr(“Email already registered.”);setBusy(false);return;}
const nu={id:uid(),name:f.name,email:f.email,password:f.password,discUsed:false,createdAt:new Date().toISOString()};
saveUsers([…users,nu]);onSignup(nu);
}else{
if(!f.email||!f.password){setErr(“Please fill in all fields.”);setBusy(false);return;}
const u=users.find(u=>u.email===f.email&&u.password===f.password);
if(!u){setErr(“Invalid email or password.”);setBusy(false);return;}
onLogin(u);
}
setBusy(false);
},0);
};
return(
<>

      <button onClick={async()=>{await saveCfg(ec);toast("Settings saved ✓");}} className="btn"
        style={{alignSelf:"flex-start",background:C.t,color:C.white,borderRadius:50,padding:"12px 28px",fontSize:14}}>
        Save All Settings
      </button>
    </div>
  )}
</div>

);
}

/* ══════════════ FORM BUILDER ══════════════ */
function FormBuilder({C,form,onSave,onClose}){
const[name,setName]=useState(form?form.name:””);
const[questions,setQuestions]=useState(form?form.questions:[]);
const[err,setErr]=useState(””);
const addQ=()=>setQuestions(p=>[…p,{id:uid(),type:“single”,question:””,subtitle:””,image:””,required:true,options:[{id:uid(),label:””,image:””,desc:””}]}]);
const delQ=qid=>setQuestions(p=>p.filter(q=>q.id!==qid));
const updQ=(qid,field,val)=>setQuestions(p=>p.map(q=>q.id===qid?{…q,[field]:val}:q));
const addOpt=qid=>setQuestions(p=>p.map(q=>q.id===qid?{…q,options:[…(q.options||[]),{id:uid(),label:””,image:””,desc:””}]}:q));
const delOpt=(qid,oid)=>setQuestions(p=>p.map(q=>q.id===qid?{…q,options:(q.options||[]).filter(o=>o.id!==oid)}:q));
const updOpt=(qid,oid,field,val)=>setQuestions(p=>p.map(q=>q.id===qid?{…q,options:(q.options||[]).map(o=>o.id===oid?{…o,[field]:val}:o)}:q));
const save=()=>{
if(!name.trim()){setErr(“Form name is required.”);return;}
if(questions.length===0){setErr(“Add at least one question.”);return;}
for(const q of questions){
if(!q.question.trim()){setErr(“All questions need text.”);return;}
if(q.type!==“text”&&(!q.options||!q.options.filter(o=>o.label.trim()).length)){setErr(“Each choice question needs at least one option.”);return;}
}
onSave({…(form?{id:form.id}:{}),name,questions});
};
return(
<>
<div className=“oi” onClick={onClose} style={{position:“fixed”,inset:0,background:“rgba(0,0,0,.4)”,zIndex:300}}/>
<div style={{position:“fixed”,inset:0,zIndex:301,overflowY:“auto”,WebkitOverflowScrolling:“touch”,padding:“16px”}}>
<div className=“mi” style={{background:C.white,borderRadius:22,width:“100%”,maxWidth:580,padding:“24px 20px”,boxShadow:“0 20px 56px rgba(0,0,0,.15)”,margin:“0 auto 40px”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:20}}>
<h2 style={{fontFamily:”‘Cormorant Garamond’,serif”,fontSize:23,color:C.t}}>{form?“Edit Form”:“Create Form”}</h2>
<button onClick={onClose} className=“btn” style={{width:30,height:30,borderRadius:“50%”,background:C.cream,fontSize:18,color:C.t,display:“flex”,alignItems:“center”,justifyContent:“center”}}>×</button>
</div>
<div style={{marginBottom:16}}><Lbl c="Form Name"/><input value={name} onChange={e=>setName(e.target.value)} placeholder=“e.g. Vintage Box Preferences” style={iSt(C)}/></div>
<div style={{display:“flex”,flexDirection:“column”,gap:12,marginBottom:12}}>
{questions.map((q,qi)=>(
<div key={q.id} style={{background:C.cream,borderRadius:14,padding:“14px”}}>
<div style={{display:“flex”,justifyContent:“space-between”,marginBottom:10}}>
<span style={{fontSize:12,fontWeight:700,color:C.pd,textTransform:“uppercase”,letterSpacing:”.08em”}}>Question {qi+1}</span>
<button onClick={()=>delQ(q.id)} className=“btn” style={{background:”#FFE0E0”,borderRadius:50,padding:“3px 10px”,fontSize:12,color:”#C04040”}}>Remove</button>
</div>
<div style={{display:“flex”,flexDirection:“column”,gap:8}}>
<div><Lbl c="Question"/><input value={q.question} onChange={e=>updQ(q.id,“question”,e.target.value)} placeholder=“e.g. What type of box?” style={iSt(C)}/></div>
<div><Lbl c="Subtitle (optional)"/><input value={q.subtitle||””} onChange={e=>updQ(q.id,“subtitle”,e.target.value)} placeholder=“e.g. Pick your vibe” style={iSt(C)}/></div>
<div><Lbl c="Question Image URL (optional)"/><input value={q.image||””} onChange={e=>updQ(q.id,“image”,e.target.value)} placeholder=“https://…” style={iSt(C)}/></div>
<div style={{display:“flex”,gap:10,flexWrap:“wrap”}}>
<div style={{flex:1,minWidth:140}}>
<Lbl c="Answer Type"/>
<select value={q.type||“single”} onChange={e=>updQ(q.id,“type”,e.target.value)} style={{…iSt(C),cursor:“pointer”}}>
<option value="single">Choose one</option>
<option value="multi">Choose multiple</option>
<option value="text">Type an answer</option>
</select>
</div>
<div style={{display:“flex”,alignItems:“flex-end”,paddingBottom:2}}>
<label style={{display:“flex”,alignItems:“center”,gap:8,cursor:“pointer”,fontSize:13,color:C.t}}>
<div onClick={()=>updQ(q.id,“required”,!q.required)} style={{width:36,height:20,background:q.required!==false?C.pd:C.b,borderRadius:50,position:“relative”,transition:“background .2s”,cursor:“pointer”,flexShrink:0}}>
<div style={{width:14,height:14,background:C.white,borderRadius:“50%”,position:“absolute”,top:3,left:q.required!==false?19:3,transition:“left .2s”}}/>
</div>
Required
</label>
</div>
</div>
{q.type!==“text”&&(
<div>
<Lbl c="Options"/>
{(q.options||[]).map((opt,oi)=>(
<div key={opt.id} style={{background:C.white,borderRadius:10,padding:“10px 12px”,marginBottom:7}}>
<div style={{display:“flex”,gap:6,marginBottom:5}}>
<input value={opt.label} onChange={e=>updOpt(q.id,opt.id,“label”,e.target.value)} placeholder={`Option ${oi+1}`} style={{…iSt(C),flex:1}}/>
{(q.options||[]).length>1&&<button onClick={()=>delOpt(q.id,opt.id)} className=“btn” style={{background:”#FFE0E0”,borderRadius:8,padding:“0 10px”,color:”#C04040”,fontSize:15,flexShrink:0}}>×</button>}
</div>
<input value={opt.image||””} onChange={e=>updOpt(q.id,opt.id,“image”,e.target.value)} placeholder=“Image URL (optional)” style={{…iSt(C),fontSize:12,marginBottom:5}}/>
<input value={opt.desc||””} onChange={e=>updOpt(q.id,opt.id,“desc”,e.target.value)} placeholder=“Short description (optional)” style={{…iSt(C),fontSize:12}}/>
</div>
))}
<button onClick={()=>addOpt(q.id)} className=“btn” style={{width:“100%”,background:C.white,border:`1px dashed ${C.b}`,borderRadius:9,padding:“7px”,fontSize:12,color:C.tm}}>+ Add Option</button>
</div>
)}
{q.type===“text”&&<div><Lbl c="Placeholder hint"/><input value={q.placeholder||””} onChange={e=>updQ(q.id,“placeholder”,e.target.value)} placeholder=“e.g. Tell us your colour preferences…” style={iSt(C)}/></div>}
</div>
</div>
))}
</div>
<button onClick={addQ} className=“btn” style={{width:“100%”,background:C.cream,border:`1.5px dashed ${C.b}`,borderRadius:11,padding:“10px”,fontSize:13,color:C.tm,marginBottom:12}}>+ Add Question</button>
{err&&<p style={{fontSize:13,color:”#C04040”,marginBottom:10}}>{err}</p>}
<div style={{display:“flex”,gap:9}}>
<button onClick={onClose} className=“btn” style={{flex:1,padding:11,background:C.cream,border:`1.5px solid ${C.b}`,borderRadius:10,fontSize:13,color:C.t}}>Cancel</button>
<button onClick={save} className="btn" style={{flex:2,padding:11,background:C.t,color:C.white,borderRadius:10,fontSize:13,fontWeight:500}}>{form?“Save Changes”:“Create Form”}</button>
</div>
</div>
</div>
</>
);
}

/* ══════════════ ITEM FORM ══════════════ */
function ItemForm({C,item,onSave,onClose,forms}){
const[f,setF]=useState({
name:item?item.name:””,price:item?item.price:””,originalPrice:item?(item.originalPrice||””):””,
images:item&&item.images&&item.images.length?item.images:[””],description:item?item.description:””,
category:item?item.category:””,stock:item!=null?item.stock:10,
featured:item?item.featured:false,tags:item&&item.tags?item.tags.join(”, “):””,
formId:item?item.formId||””:””
});
const[err,setErr]=useState(””);
const save=()=>{
if(!f.name||!f.price){setErr(“Name and price are required.”);return;}
const tags=f.tags?f.tags.split(”,”).map(t=>t.trim()).filter(Boolean):[];
const images=f.images.filter(i=>i.trim());if(!images.length)images.push(””);
onSave({…(item?{id:item.id}:{}),name:f.name,price:parseFloat(f.price),originalPrice:f.originalPrice?parseFloat(f.originalPrice):null,images,description:f.description,category:f.category,stock:parseInt(f.stock)||0,featured:f.featured,tags,formId:f.formId||null});
};
const setImg=(i,v)=>{const imgs=[…f.images];imgs[i]=v;setF({…f,images:imgs})};
const rmImg=i=>setF({…f,images:f.images.filter((_,j)=>j!==i)});
return(
<>
<div className=“oi” onClick={onClose} style={{position:“fixed”,inset:0,background:“rgba(0,0,0,.4)”,zIndex:300}}/>
<div style={{position:“fixed”,inset:0,zIndex:301,display:“flex”,alignItems:“center”,justifyContent:“center”,padding:“12px”,overflowY:“auto”,WebkitOverflowScrolling:“touch”}}>
<div className=“mi” style={{background:C.white,borderRadius:22,width:“100%”,maxWidth:520,padding:“24px 22px”,boxShadow:“0 20px 56px rgba(0,0,0,.14)”,margin:“auto”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:20}}>
<h2 style={{fontFamily:”‘Cormorant Garamond’,serif”,fontSize:23,color:C.t}}>{item?“Edit Item”:“Add New Item”}</h2>
<button onClick={onClose} className=“btn” style={{width:30,height:30,borderRadius:“50%”,background:C.cream,fontSize:18,color:C.t,display:“flex”,alignItems:“center”,justifyContent:“center”}}>×</button>
</div>
<div style={{display:“flex”,flexDirection:“column”,gap:11}}>
<div><Lbl c="Item Name *"/><input value={f.name} onChange={e=>setF({…f,name:e.target.value})} placeholder=“e.g. Vintage Music Box” style={iSt(C)}/></div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10}}>
<div><Lbl c="Price (RM) *"/><input type=“number” step=”.01” value={f.price} onChange={e=>setF({…f,price:e.target.value})} placeholder=“0.00” style={iSt(C)}/></div>
<div><Lbl c="Original (sale)"/><input type=“number” step=”.01” value={f.originalPrice} onChange={e=>setF({…f,originalPrice:e.target.value})} placeholder=“Optional” style={iSt(C)}/></div>
</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:10}}>
<div><Lbl c="Category"/><input value={f.category} onChange={e=>setF({…f,category:e.target.value})} placeholder=“e.g. Vintage” style={iSt(C)}/></div>
<div><Lbl c="Stock"/><input type=“number” value={f.stock} onChange={e=>setF({…f,stock:e.target.value})} style={iSt(C)}/></div>
</div>
<div>
<Lbl c="Image URLs"/>
{f.images.map((img,i)=>(
<div key={i} style={{display:“flex”,gap:6,marginBottom:6}}>
<input value={img} onChange={e=>setImg(i,e.target.value)} placeholder={`Image URL ${i+1}`} style={{…iSt(C),flex:1}}/>
{f.images.length>1&&<button onClick={()=>rmImg(i)} className=“btn” style={{background:”#FFE0E0”,borderRadius:8,padding:“0 11px”,color:”#C04040”,fontSize:16,flexShrink:0}}>×</button>}
</div>
))}
<button onClick={()=>setF({…f,images:[…f.images,””]})} className=“btn” style={{width:“100%”,background:C.cream,border:`1px dashed ${C.b}`,borderRadius:8,padding:“7px”,fontSize:12,color:C.tm}}>+ Add another image</button>
</div>
<div><Lbl c="Description"/><textarea value={f.description} onChange={e=>setF({…f,description:e.target.value})} rows={3} placeholder=“What’s inside this mystery box…” style={{…iSt(C),resize:“vertical”,borderRadius:10}}/></div>
<div><Lbl c="Tags (comma separated)"/><input value={f.tags} onChange={e=>setF({…f,tags:e.target.value})} placeholder=“new, bestseller, limited, popular” style={iSt(C)}/></div>
<div>
<Lbl c="Attach Order Form (optional)"/>
<select value={f.formId||””} onChange={e=>setF({…f,formId:e.target.value})} style={{…iSt(C),cursor:“pointer”}}>
<option value="">— No form, use Add to Cart + Order Now —</option>
{(forms||[]).map(frm=><option key={frm.id} value={frm.id}>📋 {frm.name}</option>)}
</select>
<p style={{fontSize:11,color:C.tl,marginTop:4}}>With a form: customers customise before ordering. Without: direct Add to Cart + Order Now.</p>
</div>
<label style={{display:“flex”,alignItems:“center”,gap:10,cursor:“pointer”}}>
<div onClick={()=>setF({…f,featured:!f.featured})} style={{width:40,height:22,background:f.featured?C.pd:C.b,borderRadius:50,position:“relative”,transition:“background .2s”,cursor:“pointer”,flexShrink:0}}>
<div style={{width:16,height:16,background:C.white,borderRadius:“50%”,position:“absolute”,top:3,left:f.featured?21:3,transition:“left .2s”}}/>
</div>
<span style={{fontSize:13,color:C.t}}>Featured item</span>
</label>
{err&&<p style={{fontSize:13,color:”#C04040”}}>{err}</p>}
<div style={{display:“flex”,gap:9,marginTop:4}}>
<button onClick={onClose} className=“btn” style={{flex:1,padding:11,background:C.cream,border:`1.5px solid ${C.b}`,borderRadius:10,fontSize:13,color:C.t}}>Cancel</button>
<button onClick={save} className="btn" style={{flex:2,padding:11,background:C.t,color:C.white,borderRadius:10,fontSize:13,fontWeight:500}}>{item?“Save Changes”:“Add Item”}</button>
</div>
</div>
</div>
</div>
</>
);
}

/* ══════════════ EDITABLE USER (Admin) ══════════════ */
function EditableUser({C,u,onSave}){
const[editing,setEditing]=useState(false);
const[name,setName]=useState(u.name);
return(
<div style={{background:C.white,borderRadius:13,padding:“12px 15px”,boxShadow:C.sh,display:“flex”,gap:11,alignItems:“center”,flexWrap:“wrap”}}>
<div style={{width:38,height:38,borderRadius:“50%”,background:`linear-gradient(135deg,${C.pd},${C.pm})`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:15,fontWeight:600,color:C.white,flexShrink:0}}>{(u.name||”?”)[0].toUpperCase()}</div>
<div style={{flex:1,minWidth:120}}>
{editing?(
<div style={{display:“flex”,gap:7,alignItems:“center”}}>
<input value={name} onChange={e=>setName(e.target.value)} style={{…iSt(C),padding:“6px 10px”,fontSize:13,flex:1}} onKeyDown={e=>{if(e.key===“Enter”){onSave({…u,name});setEditing(false);}}}/>
<button onClick={()=>{onSave({…u,name});setEditing(false);}} className=“btn” style={{background:C.pd,color:C.white,borderRadius:8,padding:“6px 12px”,fontSize:12,flexShrink:0}}>Save</button>
<button onClick={()=>{setName(u.name);setEditing(false);}} className=“btn” style={{background:C.cream,border:`1px solid ${C.b}`,borderRadius:8,padding:“6px 10px”,fontSize:12,flexShrink:0}}>×</button>
</div>
):(
<div style={{display:“flex”,alignItems:“center”,gap:8}}>
<p style={{fontSize:14,fontWeight:500,color:C.t}}>{u.name}</p>
<button onClick={()=>setEditing(true)} className=“btn” style={{background:“none”,color:C.tl,fontSize:11,padding:0,textDecoration:“underline”}}>edit name</button>
</div>
)}
<p style={{fontSize:12,color:C.tl,marginTop:2}}>{u.email}</p>
</div>
<div style={{display:“flex”,gap:7,alignItems:“center”,flexWrap:“wrap”}}>
<Chip ch={u.discUsed===false?“🎁 Discount active”:“Discount used”} bg={u.discUsed===false?C.pl:C.cream} col={u.discUsed===false?C.pd:C.tl}/>
<span style={{fontSize:11,color:C.tl}}>{new Date(u.createdAt).toLocaleDateString()}</span>
</div>
</div>
);
}

const root=ReactDOM.createRoot(document.getElementById(“root”));
root.render(<App/>);
</script>
