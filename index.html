<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mystère</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{scroll-behavior:smooth;height:100%}
body{font-family:'Jost',sans-serif;background:#FDF8F0}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#FDF8F0}
::-webkit-scrollbar-thumb{background:#F9C4D6;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(110%)}to{transform:translateX(0)}}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fu{animation:fadeUp .4s ease both}
.oi{animation:fadeInBg .22s ease both}
.si{animation:slideIn .35s cubic-bezier(.34,1.1,.64,1) both}
.mi{animation:fadeUp .32s cubic-bezier(.34,1.1,.64,1) both}
.fl{animation:floatY 3.5s ease-in-out infinite}
.card{transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.card:hover{transform:translateY(-5px) scale(1.012)}
.btn{transition:all .18s ease;cursor:pointer;outline:none;border:none;font-family:'Jost',sans-serif}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
input,textarea,select{outline:none;font-family:'Jost',sans-serif}
input:focus,textarea:focus{border-color:#F9C4D6!important;box-shadow:0 0 0 3px rgba(249,196,214,.22)!important}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;padding-bottom:64px}
@media(max-width:560px){
  .items-grid{grid-template-columns:1fr 1fr!important;gap:11px!important}
  .card-btns{flex-direction:column!important;gap:5px!important}
  .card-price{font-size:14px!important}
  .card-name{font-size:16px!important}
  .hide-sm{display:none!important}
}
.modal-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── COLOURS ── */
const C={
  cream:"#FDF8F0",white:"#FFFFFF",
  pl:"#FFF0F6",pm:"#F9C4D6",pd:"#E8859F",
  yl:"#FFFBEE",ym:"#F5E190",yd:"#C8A800",
  t:"#3C2A1E",tm:"#7A5C44",tl:"#B09880",
  b:"#EEE5D8",
  sh:"0 4px 20px rgba(180,140,120,.1)",
  sh2:"0 12px 36px rgba(180,120,120,.16)"
};

/* ── DEFAULT CONFIG ── */
const DCFG={
  whatsapp:"60123456789",
  adminPass:"admin123",
  siteName:"Mystère",
  tagline:"curated mystery boxes ✦",
  discPct:10,
  promoCode:"",
  promoPct:0,
  jbKey:"$2a$10$BXkVan9Db9eFVS1ghQjrpuq39DtVmn5Y2JEf7MXpf0UGyY4HngBG6",
  jbId:"69afda2eff3f7076473e2c11",
  aboutText:"We are Mystère — a small, passion-driven mystery box brand. Every box is carefully curated with love, bringing you delightful surprises that make ordinary days feel magical. ✦\n\nEach box is packed with handpicked items chosen to bring joy, beauty, and a little magic into your life.",
  contactWa:"60123456789",
  contactEmail:"hello@mystere.com",
  contactIG:"@mystere"
};

/* ── LOCAL STORAGE ── */
const LS={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

/* ── JSONBIN (cloud sync) ── */
const JB={
  async pull(key,id){
    if(!key||!id)return null;
    try{
      const r=await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`,{headers:{'X-Master-Key':key}});
      if(!r.ok)return null;
      const d=await r.json();
      return d.record||null;
    }catch{return null}
  },
  async push(key,id,data){
    if(!key||!id)return false;
    try{
      const r=await fetch(`https://api.jsonbin.io/v3/b/${id}`,{
        method:'PUT',
        headers:{'X-Master-Key':key,'Content-Type':'application/json'},
        body:JSON.stringify(data)
      });
      return r.ok;
    }catch{return false}
  }
};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const iSt=(x={})=>({width:"100%",padding:"11px 15px",borderRadius:10,border:`1.5px solid ${C.b}`,fontSize:14,background:C.cream,color:C.t,fontFamily:"'Jost',sans-serif",...x});
function Lbl({c}){return <label style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".09em",color:C.tm,display:"block",marginBottom:5}}>{c}</label>;}
function Chip({ch,bg,col}){return <span style={{background:bg||C.yl,color:col||C.tm,borderRadius:50,padding:"3px 10px",fontSize:11,fontWeight:500}}>{ch}</span>;}
function Toast({m}){return <div className="mi" style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:C.t,color:C.white,padding:"10px 24px",borderRadius:50,zIndex:9999,fontSize:13,whiteSpace:"nowrap",boxShadow:"0 6px 20px rgba(0,0,0,.2)",pointerEvents:"none"}}>{m}</div>;}

/* ══════════════ APP ══════════════ */
function App(){
  const[pg,setPg]=useState("shop");
  const[cur,setCur]=useState(null);
  const[items,setItemsS]=useState([]);
  const[cart,setCart]=useState([]);
  const[cOpen,setCOpen]=useState(false);
  const[aOpen,setAOpen]=useState(false);
  const[aMode,setAMode]=useState("login");
  const[user,setUser]=useState(null);
  const[users,setUsersS]=useState([]);
  const[cfg,setCfgS]=useState(DCFG);
  const[notif,setNotif]=useState(null);
  const[adminOk,setAdminOk]=useState(false);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const logoTaps=useRef(0);
  const logoTimer=useRef(null);

  /* ── LOAD DATA ── always pull from cloud ── */
  useEffect(()=>{(async()=>{
    const cloud=await JB.pull(DCFG.jbKey,DCFG.jbId);
    if(cloud){
      setItemsS(cloud.items||[]);LS.set("mx:items",cloud.items||[]);
      setUsersS(cloud.users||[]);LS.set("mx:users",cloud.users||[]);
      const merged={...DCFG,...(cloud.cfg||{})};setCfgS(merged);LS.set("mx:cfg",merged);
      setLoading(false);return;
    }
    setItemsS(LS.get("mx:items")||[]);
    setUsersS(LS.get("mx:users")||[]);
    setCfgS(LS.get("mx:cfg")||DCFG);
    setLoading(false);
  })();},[]);

  /* ── SAVE ── */
  const syncCloud=async(newItems,newUsers,newCfg)=>{
    const c=newCfg||cfg;
    if(!c.jbKey||!c.jbId)return;
    await JB.push(c.jbKey,c.jbId,{items:newItems||items,users:newUsers||users,cfg:c});
  };
  const saveItems=async v=>{setItemsS(v);LS.set("mx:items",v);await syncCloud(v,null,null);};
  const saveUsers=async v=>{setUsersS(v);LS.set("mx:users",v);await syncCloud(null,v,null);};
  const saveCfg=async v=>{setCfgS(v);LS.set("mx:cfg",v);await syncCloud(null,null,v);};

  /* ── TOAST ── */
  const toast=m=>{setNotif(m);setTimeout(()=>setNotif(null),3000)};

  /* ── SECRET ADMIN (tap logo 5x) ── */
  const handleLogoTap=()=>{
    logoTaps.current++;
    clearTimeout(logoTimer.current);
    if(logoTaps.current>=5){logoTaps.current=0;setPg("admin");toast("🔐 Admin mode")}
    else{logoTimer.current=setTimeout(()=>{logoTaps.current=0},2000)}
  };

  /* ── CHECK URL FOR ?admin ── */
  useEffect(()=>{
    if(window.location.search.includes("admin")||window.location.hash.includes("admin")){
      setPg("admin");
    }
  },[]);

  /* ── CART ── */
  const addCart=(it,qty=1)=>{
    setCart(p=>{const e=p.find(c=>c.id===it.id);return e?p.map(c=>c.id===it.id?{...c,qty:c.qty+qty}:c):[...p,{...it,qty}]});
    toast(`${it.name} added! 🛍️`);
  };
  const remCart=id=>setCart(p=>p.filter(c=>c.id!==id));
  const updQty=(id,q)=>{if(q<1)return remCart(id);setCart(p=>p.map(c=>c.id===id?{...c,qty:q}:c))};

  const cnt=cart.reduce((s,c)=>s+c.qty,0);
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const hasSignupDisc=user&&user.discUsed===false;

  const goItem=it=>{setCur(it);setPg("item");window.scrollTo(0,0)};
  const goShop=()=>{setPg("shop");setCur(null)};

  const checkout=(promoApplied,discAmt)=>{
    if(!cart.length)return;
    const n=user?user.name:"Customer";
    const lines=cart.map(c=>`• ${c.name} x${c.qty} — RM${(c.price*c.qty).toFixed(2)}`).join("\n");
    let msg=`Hello! I'd like to place an order 🛍️\n\n*Order Details:*\n${lines}\n\n`;
    if(discAmt>0)msg+=`Discount: -RM${discAmt.toFixed(2)}\n`;
    msg+=`*Total: RM${(sub-discAmt).toFixed(2)}*\n\nName: ${n}`;
    if(user&&user.email)msg+=`\nEmail: ${user.email}`;
    window.open(`https://wa.me/${cfg.whatsapp}?text=${encodeURIComponent(msg)}`,"_blank");
    if(hasSignupDisc&&user&&promoApplied==="signup"){
      const u2={...user,discUsed:true};setUser(u2);saveUsers(users.map(u=>u.email===user.email?u2:u));
    }
  };

  if(loading)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${C.pl},${C.yl})`,gap:12}}>
      <div className="fl" style={{fontSize:48}}>✦</div>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,color:C.t}}>{DCFG.siteName}</p>
      <p style={{color:C.tl,fontSize:13,letterSpacing:".12em"}}>preparing your magic…</p>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.cream,display:"flex",flexDirection:"column"}}>
      {notif&&<Toast m={notif}/>}

      {/* ── NAV ── */}
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(253,248,240,.96)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${C.b}`,padding:"0 20px",flexShrink:0}}>
        <div style={{maxWidth:1200,margin:"0 auto",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <button onClick={()=>{handleLogoTap();goShop()}} className="btn" style={{background:"none",display:"flex",alignItems:"center",gap:7,padding:0}}>
            <span style={{color:C.pd,fontSize:18}}>✦</span>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:C.t}}>{cfg.siteName}</span>
          </button>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            {user?(
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:12,color:C.tm}} className="hide-sm">{user.name.split(" ")[0]}</span>
                <button onClick={()=>setUser(null)} className="btn" style={{background:C.pl,borderRadius:50,padding:"6px 14px",fontSize:12,color:C.pd}}>logout</button>
              </div>
            ):(
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>{setAMode("login");setAOpen(true)}} className="btn" style={{background:"none",border:`1.5px solid ${C.b}`,borderRadius:50,padding:"6px 14px",fontSize:13,color:C.t}}>login</button>
                <button onClick={()=>{setAMode("signup");setAOpen(true)}} className="btn hide-sm" style={{background:C.pm,borderRadius:50,padding:"6px 14px",fontSize:13,color:C.t}}>sign up</button>
              </div>
            )}
            <button onClick={()=>setCOpen(true)} className="btn" style={{position:"relative",background:C.t,borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontSize:16}}>🛍️</span>
              {cnt>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.pd,color:C.white,borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{cnt}</span>}
            </button>
          </div>
        </div>
      </nav>

      {/* ── PAGES ── */}
      <div style={{flex:1}}>
        {pg==="shop"&&<ShopPage items={items} onItem={goItem} onAdd={addCart} cfg={cfg}/>}
        {pg==="item"&&cur&&<ItemPage item={cur} items={items} onBack={goShop} onAdd={addCart} onItem={goItem}/>}
        {pg==="about"&&<AboutPage cfg={cfg} onBack={goShop}/>}
        {pg==="contact"&&<ContactPage cfg={cfg} onBack={goShop}/>}
        {pg==="privacy"&&<PrivacyPage cfg={cfg} onBack={goShop}/>}
        {pg==="admin"&&<AdminPage ok={adminOk} onAuth={p=>{if(p===cfg.adminPass){setAdminOk(true);return true}return false}} items={items} saveItems={saveItems} users={users} saveUsers={saveUsers} cfg={cfg} saveCfg={saveCfg} onBack={goShop} toast={toast} syncing={syncing}/>}
      </div>

      {/* ── FOOTER ── */}
      {pg!=="admin"&&(
        <footer style={{background:C.t,color:"rgba(255,255,255,.6)",padding:"40px 20px 24px",marginTop:"auto"}}>
          <div style={{maxWidth:1200,margin:"0 auto"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:32,marginBottom:32}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
                  <span style={{color:C.pd,fontSize:16}}>✦</span>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:C.white,fontWeight:500}}>{cfg.siteName}</span>
                </div>
                <p style={{fontSize:13,lineHeight:1.7}}>{cfg.tagline}</p>
              </div>
              <div>
                <p style={{color:C.white,fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Explore</p>
                {[["shop","🛍️ Shop"],["about","About Us"],["contact","Contact"]].map(([p,l])=>(
                  <button key={p} onClick={()=>{setPg(p);window.scrollTo(0,0)}} className="btn" style={{display:"block",background:"none",color:"rgba(255,255,255,.6)",fontSize:13,padding:"3px 0",textAlign:"left",width:"100%"}}
                    onMouseEnter={e=>e.currentTarget.style.color=C.white} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.6)"}>{l}</button>
                ))}
              </div>
              <div>
                <p style={{color:C.white,fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Legal</p>
                <button onClick={()=>{setPg("privacy");window.scrollTo(0,0)}} className="btn" style={{display:"block",background:"none",color:"rgba(255,255,255,.6)",fontSize:13,padding:"3px 0",textAlign:"left",width:"100%"}}
                  onMouseEnter={e=>e.currentTarget.style.color=C.white} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.6)"}>Privacy Policy</button>
              </div>
              <div>
                <p style={{color:C.white,fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Contact Us</p>
                <p style={{fontSize:13,lineHeight:1.8}}>
                  📱 <a href={`https://wa.me/${cfg.contactWa||cfg.whatsapp}`} target="_blank" style={{color:"rgba(255,255,255,.6)",textDecoration:"none"}}>{cfg.contactWa||cfg.whatsapp}</a><br/>
                  {cfg.contactIG&&<>📸 {cfg.contactIG}<br/></>}
                  {cfg.contactEmail&&<>✉️ {cfg.contactEmail}</>}
                </p>
              </div>
            </div>
            <div style={{borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <p style={{fontSize:12}}>© {new Date().getFullYear()} {cfg.siteName}. All rights reserved.</p>
              <button onClick={()=>{setPg("admin");window.scrollTo(0,0)}} className="btn" style={{background:"none",color:"rgba(255,255,255,.15)",fontSize:11,padding:0}}
                onMouseEnter={e=>e.currentTarget.style.color="rgba(255,255,255,.35)"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.15)"}>manage</button>
            </div>
          </div>
        </footer>
      )}

      {/* ── OVERLAYS ── */}
      {cOpen&&<CartDrawer cart={cart} onClose={()=>setCOpen(false)} onRem={remCart} onQty={updQty} onCheckout={checkout} sub={sub} hasSignupDisc={hasSignupDisc} discPct={cfg.discPct} cfg={cfg} user={user} onSignup={()=>{setCOpen(false);setAMode("signup");setAOpen(true)}}/>}
      {aOpen&&<AuthModal mode={aMode} setMode={setAMode} onClose={()=>setAOpen(false)} users={users} saveUsers={saveUsers} onLogin={u=>{setUser(u);setAOpen(false);toast(`Welcome back, ${u.name}! 💕`)}} onSignup={u=>{setUser(u);setAOpen(false);toast(`Welcome ${u.name}! 🎉 You've got ${cfg.discPct}% off!`)}} cfg={cfg}/>}
    </div>
  );
}

/* ══════════════ SHOP PAGE ══════════════ */
function ShopPage({items,onItem,onAdd,cfg}){
  const[q,setQ]=useState("");
  const list=items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase()));
  return(
    <div>
      {/* Hero */}
      <div style={{background:`linear-gradient(150deg,${C.pl} 0%,${C.yl} 55%,${C.cream} 100%)`,padding:"68px 24px 48px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        {[{top:"10%",left:"5%",s:26,d:0},{top:"20%",right:"7%",s:15,d:1.1},{bottom:"12%",right:"10%",s:20,d:.5},{bottom:"20%",left:"12%",s:10,d:1.7}].map((p,i)=>(
          <span key={i} className="fl" style={{position:"absolute",fontSize:p.s,opacity:.18,color:C.pd,top:p.top,left:p.left,right:p.right,bottom:p.bottom,animationDelay:`${p.d}s`}}>✦</span>
        ))}
        <p style={{fontSize:11,letterSpacing:".3em",textTransform:"uppercase",color:C.pd,marginBottom:8,fontWeight:500}}>welcome to</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(46px,8vw,84px)",fontWeight:400,color:C.t,lineHeight:1,marginBottom:8}}>{cfg.siteName}</h1>
        <p style={{color:C.tm,fontSize:14,marginBottom:30}}>{cfg.tagline}</p>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          {["✦ mystery inside","✦ curated with love","✦ free surprise"].map(t=>(
            <span key={t} style={{background:C.white,border:`1px solid ${C.b}`,borderRadius:50,padding:"6px 16px",fontSize:12,color:C.tm}}>{t}</span>
          ))}
        </div>
      </div>
      {/* Grid */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"28px 16px 0"}}>
        <div style={{marginBottom:22}}>
          <input placeholder="🔍  search mystery boxes…" value={q} onChange={e=>setQ(e.target.value)}
            style={{width:"100%",maxWidth:500,padding:"10px 18px",borderRadius:50,border:`1.5px solid ${C.b}`,background:C.white,fontSize:14,color:C.t,display:"block",margin:"0 auto"}}/>
        </div>
        {list.length===0?(
          <div style={{textAlign:"center",padding:"72px 0",color:C.tl}}>
            <div style={{fontSize:44,marginBottom:14}}>✦</div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22}}>{q?"No boxes found":"Shop coming soon ✦"}</p>
            {!q&&<p style={{fontSize:13,marginTop:8,color:C.tl}}>Items will appear here once added from the admin panel.</p>}
          </div>
        ):(
          <div className="items-grid">
            {list.map((it,i)=><ItemCard key={it.id} item={it} onItem={onItem} onAdd={onAdd} delay={i*50}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════ ITEM CARD ══════════════ */
function ItemCard({item,onItem,onAdd,delay=0}){
  const[h,setH]=useState(false);
  return(
    <div className="card fu" onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:C.white,borderRadius:18,overflow:"hidden",boxShadow:h?C.sh2:C.sh,animationDelay:`${delay}ms`,cursor:"pointer"}}>
      <div onClick={()=>onItem(item)} style={{position:"relative",paddingTop:"100%",overflow:"hidden",background:C.pl}}>
        <img src={item.images&&item.images[0]} alt={item.name} onError={e=>e.target.style.display="none"}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",transition:"transform .5s",transform:h?"scale(1.07)":"scale(1)"}}/>
        {item.originalPrice&&<div style={{position:"absolute",top:9,left:9,background:C.pm,borderRadius:50,padding:"2px 9px",fontSize:10,fontWeight:700,color:C.t}}>SALE</div>}
        {item.tags&&item.tags.includes("limited")&&<div style={{position:"absolute",top:9,right:9,background:C.ym,borderRadius:50,padding:"2px 9px",fontSize:10,fontWeight:700,color:C.t}}>LIMITED</div>}
        {item.tags&&item.tags.includes("bestseller")&&!item.tags.includes("limited")&&<div style={{position:"absolute",top:9,right:9,background:C.yl,border:`1px solid ${C.ym}`,borderRadius:50,padding:"2px 9px",fontSize:10,fontWeight:700,color:C.yd}}>★ BEST</div>}
        {item.tags&&item.tags.includes("new")&&!item.tags.includes("limited")&&!item.tags.includes("bestseller")&&<div style={{position:"absolute",top:9,right:9,background:C.white,borderRadius:50,padding:"2px 9px",fontSize:10,fontWeight:700,color:C.pd}}>NEW</div>}
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(253,248,240,.55)",opacity:h?1:0,transition:"opacity .3s"}}>
          <span style={{fontSize:34}}>🎁</span>

/* ══════════════ CART ══════════════ */
function CartDrawer({cart,onClose,onRem,onQty,onCheckout,sub,hasSignupDisc,discPct,cfg,user,onSignup}){
  const[promoInput,setPromoInput]=useState("");
  const[promoApplied,setPromoApplied]=useState(null); // null | "signup" | "promo"
  const[promoErr,setPromoErr]=useState("");

  const applyPromo=()=>{
    const code=promoInput.trim().toUpperCase();
    if(!code){setPromoErr("Please enter a code.");return}
    if(cfg.promoCode&&code===cfg.promoCode.toUpperCase()){
      setPromoApplied("promo");setPromoErr("");
    } else {
      setPromoErr("Invalid discount code.");
    }
  };

  let discAmt=0;
  let discLabel="";
  if(promoApplied==="signup"||hasSignupDisc&&promoApplied===null){
    discAmt=sub*(discPct/100);
    discLabel=`Welcome discount (${discPct}%)`;
    if(promoApplied===null)setPromoApplied("signup");
  } else if(promoApplied==="promo"&&cfg.promoPct>0){
    discAmt=sub*(cfg.promoPct/100);
    discLabel=`Promo code (${cfg.promoPct}%)`;
  }
  // auto-apply signup discount
  useEffect(()=>{if(hasSignupDisc&&promoApplied===null)setPromoApplied("signup")},[hasSignupDisc]);

  const total=sub-discAmt;

  return(
    <>
      <div className="oi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:200}}/>
      <div className="si" style={{position:"fixed",right:0,top:0,bottom:0,width:"min(410px,100vw)",background:C.white,zIndex:201,display:"flex",flexDirection:"column",boxShadow:"-4px 0 40px rgba(0,0,0,.1)"}}>
        {/* Head */}
        <div style={{padding:"15px 18px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:25,fontWeight:500,color:C.t}}>Your Cart</h2>
            <p style={{fontSize:12,color:C.tl}}>{cart.length} item{cart.length!==1?"s":""}</p>
          </div>
          <button onClick={onClose} className="btn" style={{width:34,height:34,borderRadius:"50%",background:C.cream,fontSize:20,color:C.t,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        {/* Items */}
        <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"11px 18px"}}>
          {cart.length===0?(
            <div style={{textAlign:"center",padding:"56px 0",color:C.tl}}>
              <div style={{fontSize:44,marginBottom:12}}>🛍️</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20}}>Your cart is empty</p>
              <p style={{fontSize:13,marginTop:6}}>Add some mystery boxes!</p>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {cart.map(it=>(
                <div key={it.id} style={{display:"flex",gap:10,padding:11,background:C.cream,borderRadius:13}}>
                  <div style={{width:62,height:62,borderRadius:10,overflow:"hidden",background:C.pl,flexShrink:0}}>
                    <img src={it.images&&it.images[0]} alt={it.name} onError={e=>e.target.style.display="none"} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:C.t,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.name}</p>
                    <p style={{fontSize:13,fontWeight:700,color:C.t,marginBottom:6}}>RM {it.price.toFixed(2)}</p>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",background:C.white,borderRadius:50,border:`1px solid ${C.b}`,overflow:"hidden"}}>
                        <button onClick={()=>onQty(it.id,it.qty-1)} className="btn" style={{width:26,height:26,background:"none",fontSize:16,color:C.t,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                        <span style={{width:22,textAlign:"center",fontSize:12,fontWeight:500}}>{it.qty}</span>
                        <button onClick={()=>onQty(it.id,it.qty+1)} className="btn" style={{width:26,height:26,background:"none",fontSize:16,color:C.t,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                      </div>
                      <button onClick={()=>onRem(it.id)} className="btn" style={{background:"none",color:C.tl,fontSize:12,padding:"3px 7px"}}>remove</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Footer */}
        {cart.length>0&&(
          <div style={{padding:"14px 18px",borderTop:`1px solid ${C.b}`,flexShrink:0}}>
            {/* Signup upsell */}
            {!user&&!promoApplied&&(
              <div style={{background:C.yl,borderRadius:11,padding:"9px 13px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                <p style={{fontSize:12,color:C.tm}}>🎁 Sign up for {discPct}% off!</p>
                <button onClick={onSignup} className="btn" style={{background:C.ym,borderRadius:50,padding:"5px 12px",fontSize:12,color:C.t,flexShrink:0}}>Sign up</button>
              </div>
            )}
            {/* Promo code box */}
            {!promoApplied&&(
              <div style={{marginBottom:10}}>
                <div style={{display:"flex",gap:7}}>
                  <input placeholder="Discount code" value={promoInput} onChange={e=>{setPromoInput(e.target.value);setPromoErr("")}}
                    onKeyDown={e=>e.key==="Enter"&&applyPromo()}
                    style={{flex:1,padding:"8px 13px",borderRadius:9,border:`1.5px solid ${C.b}`,fontSize:13,background:C.cream,color:C.t}}/>
                  <button onClick={applyPromo} className="btn" style={{background:C.t,color:C.white,borderRadius:9,padding:"8px 14px",fontSize:12,flexShrink:0}}>Apply</button>
                </div>
                {promoErr&&<p style={{fontSize:12,color:"#C0504D",marginTop:5}}>{promoErr}</p>}
              </div>
            )}
            {/* Applied discount */}
            {promoApplied&&<div style={{background:C.pl,borderRadius:10,padding:"7px 13px",marginBottom:10,fontSize:13,color:C.pd,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>✓ {discLabel} applied!</span>
              <button onClick={()=>{setPromoApplied(null);setPromoInput("")}} className="btn" style={{background:"none",fontSize:11,color:C.pd,padding:0,textDecoration:"underline"}}>remove</button>
            </div>}
            {/* Totals */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:C.tm}}>Subtotal</span><span style={{fontSize:13,color:C.t}}>RM {sub.toFixed(2)}</span></div>
              {discAmt>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:C.pd}}>Discount</span><span style={{fontSize:13,color:C.pd}}>-RM {discAmt.toFixed(2)}</span></div>}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${C.b}`}}>
                <span style={{fontSize:15,fontWeight:600,color:C.t}}>Total</span>
                <span style={{fontSize:17,fontWeight:700,color:C.t}}>RM {total.toFixed(2)}</span>
              </div>
            </div>
            <button onClick={()=>onCheckout(promoApplied,discAmt)} className="btn" style={{width:"100%",padding:13,background:"#25D366",color:C.white,borderRadius:12,fontSize:15,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>💬</span><span>Order via WhatsApp</span>
            </button>
            <p style={{fontSize:11,color:C.tl,textAlign:"center",marginTop:6}}>You'll be redirected to WhatsApp to complete your order</p>
          </div>
        )}
      </div>
    </>
  );
}

/* ══════════════ AUTH MODAL ══════════════ */
function AuthModal({mode,setMode,onClose,users,saveUsers,onLogin,onSignup,cfg}){
  const[f,setF]=useState({name:"",email:"",password:""});
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const go=()=>{
    setErr("");setBusy(true);
    setTimeout(()=>{
      if(mode==="signup"){
        if(!f.name||!f.email||!f.password){setErr("Please fill in all fields.");setBusy(false);return}
        if(!/\S+@\S+\.\S+/.test(f.email)){setErr("Please enter a valid email.");setBusy(false);return}
        if(users.find(u=>u.email===f.email)){setErr("Email already registered.");setBusy(false);return}
        const nu={id:uid(),name:f.name,email:f.email,password:f.password,discUsed:false,createdAt:new Date().toISOString()};
        saveUsers([...users,nu]);onSignup(nu);
      }else{
        if(!f.email||!f.password){setErr("Please fill in all fields.");setBusy(false);return}
        const u=users.find(u=>u.email===f.email&&u.password===f.password);
        if(!u){setErr("Invalid email or password.");setBusy(false);return}
        onLogin(u);
      }
      setBusy(false);
    },0);
  };
  return(
    <>
      <div className="oi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300}}/>
      <div className="mi modal-scroll" style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:301,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",pointerEvents:"none"}}>
        <div style={{background:C.white,borderRadius:24,width:"100%",maxWidth:420,padding:"36px 28px",boxShadow:"0 22px 56px rgba(0,0,0,.15)",position:"relative",pointerEvents:"all",maxHeight:"90vh",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
          <button onClick={onClose} className="btn" style={{position:"absolute",top:14,right:14,width:30,height:30,borderRadius:"50%",background:C.cream,fontSize:18,color:C.t,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div className="fl" style={{fontSize:30,marginBottom:7}}>✦</div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:27,fontWeight:500,color:C.t,marginBottom:5}}>{mode==="login"?"Welcome back":`Join ${cfg.siteName}`}</h2>
            {mode==="signup"&&<p style={{fontSize:13,color:C.pd}}>🎁 Get {cfg.discPct}% off your first order!</p>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {mode==="signup"&&<input placeholder="Your name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} style={iSt()}/>}
            <input type="email" placeholder="Email address" value={f.email} onChange={e=>setF({...f,email:e.target.value})} style={iSt()}/>
            <input type="password" placeholder="Password" value={f.password} onChange={e=>setF({...f,password:e.target.value})} onKeyDown={e=>e.key==="Enter"&&go()} style={iSt()}/>
            {err&&<p style={{fontSize:13,color:"#C0504D",textAlign:"center"}}>{err}</p>}
            <button onClick={go} disabled={busy} className="btn" style={{padding:13,background:C.t,color:C.white,borderRadius:11,fontSize:14,fontWeight:500,marginTop:2}}>
              {busy?"…":mode==="login"?"Log In":"Create Account"}
            </button>
            <p style={{textAlign:"center",fontSize:13,color:C.tm}}>
              {mode==="login"?"Don't have an account? ":"Already have an account? "}
              <button onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("")}} style={{background:"none",border:"none",color:C.pd,cursor:"pointer",fontSize:13,fontWeight:600,textDecoration:"underline"}}>
                {mode==="login"?"Sign up":"Log in"}
              </button>
            </p>
          </div>
        </div>
      </div>
    </>
  );
}

            <div style={{width:46,height:46,borderRadius:14,background:C.yl,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📸</div>
            <div>
              <p style={{fontWeight:600,color:C.t,marginBottom:3}}>Instagram</p>
              <p style={{fontSize:13,color:C.tm}}>{cfg.contactIG}</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════ PRIVACY PAGE ══════════════ */
function PrivacyPage({cfg,onBack}){
  const sections=[
    ["What we collect","We collect your name and email when you create an account. We do not store your payment information."],
    ["How we use it","Your information is used only to process your orders and provide customer support. We will never sell your data to third parties."],
    ["WhatsApp Orders","When you place an order, you are redirected to WhatsApp. Your order details are shared only with us to process your purchase."],
    ["Cookies","We use local browser storage to keep your cart and account session. No third-party tracking cookies are used."],
    ["Your rights","You may request deletion of your account and data at any time by contacting us via WhatsApp or email."],
    ["Contact","For any privacy concerns, please reach out to us via the Contact page."],
  ];
  return(
    <div style={{maxWidth:720,margin:"0 auto",padding:"44px 20px 64px"}}>
      <button onClick={onBack} className="btn" style={{background:"none",color:C.tm,fontSize:14,marginBottom:28,display:"flex",alignItems:"center",gap:5}}>← back to shop</button>
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(30px,5vw,50px)",fontWeight:400,color:C.t,marginBottom:6}}>Privacy Policy</h1>
      <p style={{fontSize:13,color:C.tl,marginBottom:32}}>Last updated: {new Date().toLocaleDateString('en-MY',{year:'numeric',month:'long'})}</p>
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {sections.map(([t,d])=>(
          <div key={t} style={{background:C.white,borderRadius:14,padding:"20px 22px",boxShadow:C.sh}}>
            <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:C.t,marginBottom:8}}>{t}</h3>
            <p style={{fontSize:14,lineHeight:1.8,color:C.tm}}>{d}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════ ADMIN PAGE ══════════════ */
function AdminPage({ok,onAuth,items,saveItems,users,saveUsers,cfg,saveCfg,onBack,toast}){
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[tab,setTab]=useState("items");
  const[form,setForm]=useState(null);
  const[ec,setEc]=useState({...cfg});
  const[testStatus,setTestStatus]=useState("");

  useEffect(()=>setEc({...cfg}),[cfg]);

  const del=id=>{if(!window.confirm("Delete this item?"))return;saveItems(items.filter(i=>i.id!==id));toast("Item deleted")};

  const testCloud=async()=>{
    setTestStatus("Testing…");
    const r=await JB.pull(ec.jbKey,ec.jbId);
    setTestStatus(r!==null?"✅ Connected! Cloud sync is working.":"❌ Failed. Check your Key and Bin ID.");
  };

  if(!ok)return(
    <div style={{minHeight:"80vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.white,borderRadius:22,padding:"40px 32px",width:"min(360px,100%)",boxShadow:C.sh,textAlign:"center"}}>
        <div style={{fontSize:38,marginBottom:12}}>🔐</div>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,color:C.t,marginBottom:7}}>Admin Access</h2>
        <p style={{fontSize:13,color:C.tl,marginBottom:20}}>Enter your password to continue</p>
        <input type="password" placeholder="Admin password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){if(!onAuth(pw))setErr("Wrong password")}}}
          style={{...iSt(),marginBottom:9}}/>
        {err&&<p style={{fontSize:13,color:"#C0504D",marginBottom:9}}>{err}</p>}
        <button onClick={()=>{if(!onAuth(pw))setErr("Wrong password")}} className="btn" style={{width:"100%",padding:12,background:C.t,color:C.white,borderRadius:11,fontSize:14,marginBottom:12}}>Enter</button>
        <button onClick={onBack} className="btn" style={{background:"none",color:C.tl,fontSize:13}}>← Back to shop</button>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:1100,margin:"0 auto",padding:"26px 16px 56px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:34,color:C.t}}>Admin Panel</h1>
          <p style={{fontSize:13,color:C.tl}}>Manage your mystery box shop</p>
        </div>
        <button onClick={onBack} className="btn" style={{background:C.cream,border:`1.5px solid ${C.b}`,borderRadius:50,padding:"8px 18px",fontSize:13,color:C.t}}>← Back to Shop</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:2,marginBottom:22,borderBottom:`1px solid ${C.b}`,overflowX:"auto"}}>
        {[["items","📦 Items"],["users","👥 Customers"],["settings","⚙️ Settings"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} className="btn"
            style={{padding:"9px 18px",background:"none",borderBottom:`2.5px solid ${tab===t?C.pd:"transparent"}`,color:tab===t?C.t:C.tl,fontSize:13,borderRadius:0,marginBottom:-1,whiteSpace:"nowrap"}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── ITEMS TAB ── */}
      {tab==="items"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{fontSize:13,color:C.tm}}>{items.length} item{items.length!==1?"s":""} in shop</p>
            <button onClick={()=>setForm({})} className="btn" style={{background:C.t,color:C.white,borderRadius:50,padding:"9px 20px",fontSize:13}}>+ Add New Item</button>
          </div>
          {form!==null&&(
            <ItemForm item={form.id?form:null}
              onSave={d=>{
                if(d.id){saveItems(items.map(i=>i.id===d.id?d:i));toast("Item updated ✓")}
                else{saveItems([...items,{id:uid(),...d}]);toast("Item added ✓")}
                setForm(null);
              }}
              onClose={()=>setForm(null)}/>
          )}
          {items.length===0&&!form&&(
            <div style={{textAlign:"center",padding:"48px 0",color:C.tl}}>
              <div style={{fontSize:44,marginBottom:12}}>📦</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20}}>No items yet</p>
              <p style={{fontSize:13,marginTop:6}}>Click "+ Add New Item" to add your first mystery box!</p>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {items.map(it=>(
              <div key={it.id} style={{background:C.white,borderRadius:13,padding:13,display:"flex",gap:11,alignItems:"center",boxShadow:C.sh,flexWrap:"wrap"}}>
                <div style={{width:54,height:54,borderRadius:10,overflow:"hidden",background:C.pl,flexShrink:0}}>
                  <img src={it.images&&it.images[0]} alt={it.name} onError={e=>e.target.style.display="none"} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                </div>
                <div style={{flex:1,minWidth:100}}>
                  <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:C.t}}>{it.name}</p>
                  <p style={{fontSize:12,color:C.tm}}>RM {it.price.toFixed(2)} · {it.category||"—"} · Stock: {it.stock}</p>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button onClick={()=>setForm(it)} className="btn" style={{background:C.pl,borderRadius:50,padding:"6px 13px",fontSize:12,color:C.pd}}>Edit</button>
                  <button onClick={()=>del(it.id)} className="btn" style={{background:"#FFE0E0",borderRadius:50,padding:"6px 13px",fontSize:12,color:"#C0504D"}}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── USERS TAB ── */}
      {tab==="users"&&(
        <div>
          <p style={{fontSize:13,color:C.tm,marginBottom:14}}>{users.length} registered customer{users.length!==1?"s":""}</p>
          {users.length===0?(
            <div style={{textAlign:"center",padding:48,color:C.tl}}>
              <div style={{fontSize:40,marginBottom:10}}>👥</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20}}>No customers yet</p>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {users.map(u=>(
                <div key={u.id} style={{background:C.white,borderRadius:13,padding:"12px 15px",boxShadow:C.sh,display:"flex",gap:11,alignItems:"center",flexWrap:"wrap"}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:`linear-gradient(135deg,${C.pm},${C.ym})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:600,color:C.t,flexShrink:0}}>{u.name[0].toUpperCase()}</div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:14,fontWeight:500,color:C.t}}>{u.name}</p>
                    <p style={{fontSize:12,color:C.tl}}>{u.email}</p>
                  </div>
                  <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                    <Chip ch={u.discUsed===false?"🎁 Discount active":"Discount used"} bg={u.discUsed===false?C.pl:C.cream} col={u.discUsed===false?C.pd:C.tl}/>
                    <span style={{fontSize:11,color:C.tl}}>{new Date(u.createdAt).toLocaleDateString()}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── SETTINGS TAB ── */}
      {tab==="settings"&&(
        <div style={{maxWidth:560,display:"flex",flexDirection:"column",gap:18}}>
          {/* Site */}
          <div style={{background:C.white,borderRadius:16,padding:"20px 20px",boxShadow:C.sh}}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:C.t,marginBottom:14}}>Site Details</p>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[["Site Name","siteName","text"],["Tagline","tagline","text"],["About Text (About page)","aboutText","textarea"]].map(([l,k,t])=>(
                <div key={k}>
                  <Lbl c={l}/>
                  {t==="textarea"
                    ?<textarea value={ec[k]||""} onChange={e=>setEc({...ec,[k]:e.target.value})} rows={4} style={{...iSt(),resize:"vertical",borderRadius:10}}/>
                    :<input type={t} value={ec[k]||""} onChange={e=>setEc({...ec,[k]:e.target.value})} style={iSt()}/>
                  }
                </div>
              ))}
            </div>
          </div>

          {/* Contact */}
          <div style={{background:C.white,borderRadius:16,padding:"20px 20px",boxShadow:C.sh}}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:C.t,marginBottom:14}}>Contact Info</p>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[["WhatsApp Number (orders)","whatsapp","text"],["WhatsApp (contact page)","contactWa","text"],["Instagram","contactIG","text"],["Email","contactEmail","email"]].map(([l,k,t])=>(
                <div key={k}><Lbl c={l}/><input type={t} value={ec[k]||""} onChange={e=>setEc({...ec,[k]:e.target.value})} style={iSt()}/></div>
              ))}
            </div>
          </div>

          {/* Discounts */}
          <div style={{background:C.white,borderRadius:16,padding:"20px 20px",boxShadow:C.sh}}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:C.t,marginBottom:14}}>Discounts</p>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><Lbl c="Welcome Discount % (for new signups)"/><input type="number" value={ec.discPct||0} onChange={e=>setEc({...ec,discPct:Number(e.target.value)})} style={iSt()}/></div>
              <div><Lbl c="Promo Code (shown in cart discount box)"/><input value={ec.promoCode||""} onChange={e=>setEc({...ec,promoCode:e.target.value})} placeholder="e.g. SAVE10" style={iSt()}/></div>
              <div><Lbl c="Promo Code Discount %"/><input type="number" value={ec.promoPct||0} onChange={e=>setEc({...ec,promoPct:Number(e.target.value)})} style={iSt()}/></div>
            </div>
            <div style={{background:C.yl,borderRadius:10,padding:"10px 14px",marginTop:12,fontSize:13,color:C.tm}}>
              💡 Promo code is for anyone. Welcome discount is auto-applied for new signups on their first order.
            </div>
          </div>

          {/* Security */}
          <div style={{background:C.white,borderRadius:16,padding:"20px 20px",boxShadow:C.sh}}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:C.t,marginBottom:14}}>Security</p>
            <div><Lbl c="Admin Password"/><input type="password" value={ec.adminPass||""} onChange={e=>setEc({...ec,adminPass:e.target.value})} style={iSt()}/></div>
          </div>

          {/* Cloud Sync */}
          <div style={{background:C.white,borderRadius:16,padding:"20px 20px",boxShadow:C.sh}}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:C.t,marginBottom:6}}>☁️ Cloud Sync (cross-device)</p>
            <p style={{fontSize:13,color:C.tl,marginBottom:14,lineHeight:1.7}}>Without this, data only saves on your current device. To sync across all devices (phone + computer):</p>
            <ol style={{fontSize:13,color:C.tm,lineHeight:2,paddingLeft:18,marginBottom:16}}>
              <li>Go to <strong>jsonbin.io</strong> → Sign up free</li>
              <li>Click <strong>New Bin</strong> → type <code style={{background:C.cream,padding:"1px 5px",borderRadius:4}}>{"{}"}</code> → Save</li>
              <li>Copy the <strong>Bin ID</strong> (shown after saving)</li>
              <li>Go to <strong>Account → API Keys</strong> → Create key → Copy it</li>
              <li>Paste both below and Save Settings</li>
            </ol>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><Lbl c="JSONBin Master Key"/><input type="password" value={ec.jbKey||""} onChange={e=>setEc({...ec,jbKey:e.target.value})} placeholder="$2a$10$..." style={iSt()}/></div>
              <div><Lbl c="JSONBin Bin ID"/><input value={ec.jbId||""} onChange={e=>setEc({...ec,jbId:e.target.value})} placeholder="64abc123..." style={iSt()}/></div>
              <button onClick={testCloud} className="btn" style={{alignSelf:"flex-start",background:C.cream,border:`1.5px solid ${C.b}`,borderRadius:50,padding:"8px 18px",fontSize:13,color:C.t}}>Test Connection</button>
              {testStatus&&<p style={{fontSize:13,color:testStatus.includes("✅")?C.pd:"#C0504D"}}>{testStatus}</p>}
            </div>
          </div>

          <button onClick={async()=>{await saveCfg(ec);toast("Settings saved ✓")}} className="btn"
            style={{alignSelf:"flex-start",background:C.t,color:C.white,borderRadius:50,padding:"12px 28px",fontSize:14}}>
            Save All Settings
          </button>
        </div>
      )}
    </div>
  );
}

/* ══════════════ ITEM FORM ══════════════ */
function ItemForm({item,onSave,onClose}){
  const[f,setF]=useState({
    name:item?item.name:"",
    price:item?item.price:"",
    originalPrice:item?(item.originalPrice||""):"",
    images:item&&item.images&&item.images.length?item.images:[""],
    description:item?item.description:"",
    category:item?item.category:"",
    stock:item!==null&&item!==undefined?item.stock:10,
    featured:item?item.featured:false,
    tags:item&&item.tags?item.tags.join(", "):""
  });
  const[err,setErr]=useState("");
  const save=()=>{
    if(!f.name||!f.price){setErr("Name and price are required.");return}
    const tags=f.tags?f.tags.split(",").map(t=>t.trim()).filter(Boolean):[];
    const images=f.images.filter(i=>i.trim());
    if(!images.length)images.push("");
    onSave({
      ...(item?{id:item.id}:{}),
      name:f.name,price:parseFloat(f.price),
      originalPrice:f.originalPrice?parseFloat(f.originalPrice):null,
      images,description:f.description,category:f.category,
      stock:parseInt(f.stock)||0,featured:f.featured,tags
    });
  };
  const setImg=(i,v)=>{const imgs=[...f.images];imgs[i]=v;setF({...f,images:imgs})};
  const rmImg=i=>setF({...f,images:f.images.filter((_,j)=>j!==i)});

  return(
    <>
      <div className="oi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:300}}/>
      {/* Full-screen scrollable wrapper */}
      <div style={{position:"fixed",inset:0,zIndex:301,display:"flex",alignItems:"center",justifyContent:"center",padding:"12px",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        <div className="mi" style={{background:C.white,borderRadius:22,width:"100%",maxWidth:520,padding:"24px 22px",boxShadow:"0 20px 56px rgba(0,0,0,.14)",position:"relative",margin:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:23,color:C.t}}>{item?"Edit Item":"Add New Item"}</h2>
            <button onClick={onClose} className="btn" style={{width:30,height:30,borderRadius:"50%",background:C.cream,fontSize:18,color:C.t,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><Lbl c="Item Name *"/><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Celestial Dream Box" style={iSt()}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><Lbl c="Price (RM) *"/><input type="number" step=".01" value={f.price} onChange={e=>setF({...f,price:e.target.value})} placeholder="0.00" style={iSt()}/></div>
              <div><Lbl c="Original (sale)"/><input type="number" step=".01" value={f.originalPrice} onChange={e=>setF({...f,originalPrice:e.target.value})} placeholder="Optional" style={iSt()}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><Lbl c="Category"/><input value={f.category} onChange={e=>setF({...f,category:e.target.value})} placeholder="e.g. Beauty" style={iSt()}/></div>
              <div><Lbl c="Stock"/><input type="number" value={f.stock} onChange={e=>setF({...f,stock:e.target.value})} style={iSt()}/></div>
            </div>
            <div>
              <Lbl c="Image URLs"/>
              {f.images.map((img,i)=>(
                <div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
                  <input value={img} onChange={e=>setImg(i,e.target.value)} placeholder={`Image URL ${i+1}`} style={{...iSt(),flex:1}}/>
                  {f.images.length>1&&<button onClick={()=>rmImg(i)} className="btn" style={{background:"#FFE0E0",borderRadius:8,padding:"0 11px",color:"#C0504D",fontSize:16,flexShrink:0}}>×</button>}
                </div>
              ))}
              <button onClick={()=>setF({...f,images:[...f.images,""]})} className="btn"
                style={{width:"100%",background:C.cream,border:`1px dashed ${C.b}`,borderRadius:8,padding:"7px",fontSize:12,color:C.tm}}>
                + Add another image
              </button>
            </div>
            <div><Lbl c="Description"/><textarea value={f.description} onChange={e=>setF({...f,description:e.target.value})} rows={3} placeholder="What's inside this mystery box…" style={{...iSt(),resize:"vertical",borderRadius:10}}/></div>
            <div><Lbl c="Tags (comma separated)"/><input value={f.tags} onChange={e=>setF({...f,tags:e.target.value})} placeholder="new, bestseller, limited, popular" style={iSt()}/></div>
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
              <div onClick={()=>setF({...f,featured:!f.featured})}
                style={{width:40,height:22,background:f.featured?C.pd:C.b,borderRadius:50,position:"relative",transition:"background .2s",cursor:"pointer",flexShrink:0}}>
                <div style={{width:16,height:16,background:C.white,borderRadius:"50%",position:"absolute",top:3,left:f.featured?21:3,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.15)"}}/>
              </div>
              <span style={{fontSize:13,color:C.t}}>Featured item</span>
            </label>
            {err&&<p style={{fontSize:13,color:"#C0504D"}}>{err}</p>}
            <div style={{display:"flex",gap:9,marginTop:4}}>
              <button onClick={onClose} className="btn" style={{flex:1,padding:11,background:C.cream,border:`1.5px solid ${C.b}`,borderRadius:10,fontSize:13,color:C.t}}>Cancel</button>
              <button onClick={save} className="btn" style={{flex:2,padding:11,background:C.t,color:C.white,borderRadius:10,fontSize:13,fontWeight:500}}>{item?"Save Changes":"Add Item"}</button>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
